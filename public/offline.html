<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApaGalbenelelor - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F1EFED;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .drop {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
    }
    h1 {
      color: #1B6B93;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #666;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #1B6B93;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="drop" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 5 C50 5 10 55 10 78 C10 100 28 115 50 115 C72 115 90 100 90 78 C90 55 50 5 50 5Z" fill="#1B6B93" opacity="0.3"/>
    </svg>
    <h1>Fara conexiune</h1>
    <p>Nu exista conexiune la internet. Verifica reteaua si incearca din nou.</p>
    <button onclick="window.location.reload()">Reincearca</button>
  </div>
</body>
</html>
